# BCFtools mpileup/call Quality Parameters
# Pipeline: bcftools mpileup | bcftools call | bcftools norm
# Only quality-affecting params — threads, memory, timeout are auto-detected.

# --- mpileup: base/mapping quality ---

# Skip alignments with mapQ smaller than this (0-60)
min_MQ=0

# Skip bases with baseQ/BAQ smaller than this (0-50)
min_BQ=13

# Cap base quality to this maximum value (1-90)
max_BQ=60

# Smooth isolated high base qualities: reduce if exceeds neighbor + delta (0-99, 99=disable)
delta_BQ=30

# Adjust mapping quality, recommended 50 for BWA (0-100)
adjust_MQ=50

# --- mpileup: depth limits ---

# Max raw per-file depth, avoids excessive memory usage (0-10000)
max_depth=250

# Max per-file depth for indel calling (1-10000)
max_idepth=250

# --- mpileup: BAQ (base alignment quality) ---

# Disable base alignment quality computation (true/false)
no_BAQ=false

# Apply BAQ on all reads, not just problematic regions (true/false)
full_BAQ=false

# Recalculate BAQ on the fly, ignoring existing BQ tags (true/false)
redo_BAQ=false

# --- mpileup: indel calling ---

# Phred-scaled gap open sequencing error probability; lower = more indels (1-60)
open_prob=40

# Phred-scaled gap extension sequencing error probability; lower = longer indels (1-60)
ext_prob=20

# Minimum fraction of gapped reads to consider an indel candidate (0.0-1.0)
gap_frac=0.002

# Coefficient for homopolymer error modeling; higher = more confident indel calls (0-1000)
tandem_qual=500

# Indel recall vs precision bias; <1.0 = fewer FPs, >1.0 = fewer FNs (0.1-5.0)
indel_bias=1.0

# Deletion vs insertion likelihood bias; lower = deletions less likely real (0.1-2.0)
del_bias=1.0

# Minimum number of gapped reads for an indel candidate (1-100)
min_ireads=1

# Indel quality scored vs reference (1.0) or vs next-best alt (0.0); interpolates (0.0-1.0)
score_vs_ref=0.0

# --- mpileup: read filtering ---

# Include anomalous read pairs in variant calling (true/false)
count_orphans=false

# --- call: caller mode ---

# Use multiallelic caller, recommended (true/false)
multiallelic_caller=true

# Output variant sites only (true/false)
variants_only=true

# --- call: genotyping ---

# Predefined ploidy (GRCh37, GRCh38, X, Y, 1, 2)
ploidy=GRCh38

# Mutation rate prior for multiallelic caller -m (0.0-1.0)
prior=0.0011

# P-value threshold for consensus caller -c only; inactive with -m (0.0-1.0)
pval_threshold=0.5
