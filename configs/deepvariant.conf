# DeepVariant Quality Parameters
# Adjust these values to optimize variant calling quality.
# Only quality-affecting params — threads, memory, timeout are auto-detected.

# Model type for variant calling (WGS, WES, PACBIO, HYBRID_PACBIO_ILLUMINA)
model_type=WGS

# --- Candidate variant thresholds (make_examples stage) ---

# Minimum fraction of reads supporting an indel variant (0.0-1.0)
vsc_min_fraction_indels=0.12

# Minimum fraction of reads supporting a SNP variant (0.0-1.0)
vsc_min_fraction_snps=0.12

# Minimum number of reads supporting a SNP to consider it a candidate (0-50)
vsc_min_count_snps=2

# Minimum number of reads supporting an indel to consider it a candidate (0-50)
vsc_min_count_indels=2

# --- Read quality filters (make_examples stage) ---

# Minimum mapping quality to keep a read (0-60)
min_mapping_quality=5

# Minimum base quality for alternate alleles (0-50)
min_base_quality=10

# --- Read processing (make_examples stage) ---

# Locally realign reads before calling variants (true/false)
realign_reads=true

# Left-align indels for each read in the allele counter (true/false)
normalize_reads=false

# Retain reads marked as PCR duplicates (true/false)
keep_duplicates=false

# Max reads considered per partition; limits downsampling at high-coverage sites (100-5000)
max_reads_per_partition=1500

# --- Haplotype-aware calling (make_examples stage) ---

# Sort reads by haplotype in the pileup image (true/false)
sort_by_haplotypes=false

# Calculate phases on-the-fly and add HP tags to reads (true/false)
phase_reads=false

# --- Post-processing (postprocess_variants stage) ---

# QUAL score threshold; variants below this are marked FILTERED (0.0-50.0)
qual_filter=1.0

# Separate QUAL filter threshold for multi-allelic sites (0.0-50.0)
multi_allelic_qual_filter=1.0

# Minimum GQ for homozygous-reference calls from the CNN (0.0-50.0)
cnn_homref_call_min_gq=20.0

# Use specialized model for multi-allelic genotype resolution (true/false)
use_multiallelic_model=false
